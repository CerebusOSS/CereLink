name: Build and Release

on:
  workflow_dispatch:
  push:
    branches:
      - 'master'
      - 'releases/**'
  pull_request:
    branches:
      - master
  release:
    types: [published]

permissions:
  contents: write

defaults:
  run:
    shell: bash

jobs:
  build:
    name: ${{ matrix.config.name }}
    runs-on: ${{ matrix.config.os }}
    strategy:
      fail-fast: false
      matrix:
        config:
          - {name: "windows-x64", os: "windows-latest", cmake_extra: "", arch: "AMD64"}
          - {name: "macOS-latest", os: "macOS-latest", cmake_extra: "", arch: "auto"}
          - {name: "linux-x64", os: "ubuntu-latest", cmake_extra: "", arch: "x86_64"}
          - {name: "linux-arm64", os: "ubuntu-latest", cmake_extra: "", arch: "aarch64"}

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU for ARM emulation
        if: matrix.config.arch == 'aarch64'
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Install ARM64 cross-compilation tools
        if: matrix.config.arch == 'aarch64'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu

      - name: Create CMake toolchain file for ARM64
        if: matrix.config.arch == 'aarch64'
        run: |
          cat > arm64-toolchain.cmake << 'EOF'
          set(CMAKE_SYSTEM_NAME Linux)
          set(CMAKE_SYSTEM_PROCESSOR aarch64)
          set(CMAKE_C_COMPILER aarch64-linux-gnu-gcc)
          set(CMAKE_CXX_COMPILER aarch64-linux-gnu-g++)
          set(CMAKE_FIND_ROOT_PATH_MODE_PROGRAM NEVER)
          set(CMAKE_FIND_ROOT_PATH_MODE_LIBRARY ONLY)
          set(CMAKE_FIND_ROOT_PATH_MODE_INCLUDE ONLY)
          set(CMAKE_FIND_ROOT_PATH_MODE_PACKAGE ONLY)
          EOF

      - name: Configure CBSDK
        run: |
          cmake --version
          TOOLCHAIN_ARG=""
          SHLIBDEPS_ARG="-DCPACK_DEBIAN_PACKAGE_SHLIBDEPS=ON"
          if [ "${{ matrix.config.arch }}" = "aarch64" ]; then
            TOOLCHAIN_ARG="-DCMAKE_TOOLCHAIN_FILE=arm64-toolchain.cmake"
            SHLIBDEPS_ARG="-DCPACK_DEBIAN_PACKAGE_SHLIBDEPS=OFF"
          fi
          cmake -B build -S . \
          -DCBSDK_BUILD_TEST=OFF \
          -DCBSDK_BUILD_SAMPLE=OFF \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_INSTALL_PREFIX=${PWD}/install \
          -DCPACK_PACKAGE_DIRECTORY=${PWD}/dist \
          $SHLIBDEPS_ARG \
          $TOOLCHAIN_ARG \
          ${{ matrix.config.cmake_extra }}

      - name: Build and Package
        run: |
          cmake --build build --target install --config Release -j
          # Skip CPack for ARM64 due to missing shlibdeps support
          if [ "${{ matrix.config.arch }}" != "aarch64" ]; then
            cmake --build build --target package --config Release -j
          fi

      - name: Upload C++ Packages
        uses: actions/upload-artifact@v4
        with:
          name: cpp-packages-${{ matrix.config.name }}
          path: dist/*
          if-no-files-found: ignore

      - name: Attach to Release
        uses: softprops/action-gh-release@v1
        if: github.event_name == 'release'
        with:
          files: dist/*
