name: Tests

on:
  push:
    branches:
      - 'master'
      - 'releases/**'
  pull_request:
    branches:
      - master

defaults:
  run:
    shell: bash

jobs:
  test:
    name: Unit ${{ matrix.config.name }}
    runs-on: ${{ matrix.config.os }}
    strategy:
      fail-fast: false
      matrix:
        config:
          - {name: "windows-x64", os: "windows-latest", cmake_extra: "-T v142,host=x86"}
          - {name: "macOS-latest", os: "macOS-latest"}
          - {name: "ubuntu-latest", os: "ubuntu-latest"}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configure CBSDK
        run: |
          cmake --version
          cmake -B build -S . \
          -DCBSDK_BUILD_CBMEX=OFF \
          -DCBSDK_BUILD_CBOCT=OFF \
          -DCBSDK_BUILD_TEST=ON \
          -DCBSDK_BUILD_SAMPLE=OFF \
          -DCBSDK_BUILD_TOOLS=OFF \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_INSTALL_PREFIX=${PWD}/install \
          ${{ matrix.config.cmake_extra }}

      - name: Build
        run: cmake --build build --config Release -j

      - name: Run Unit Tests
        run: >
          ctest --test-dir build --build-config Release --output-on-failure
          -E "^(device|integration)\."

  integration:
    name: Integration ${{ matrix.config.name }}
    runs-on: ${{ matrix.config.os }}
    strategy:
      fail-fast: false
      matrix:
        config:
          - {name: "macOS-latest", os: "macOS-latest"}
          - {name: "ubuntu-latest", os: "ubuntu-latest"}
          - {name: "windows-x64", os: "windows-latest", cmake_extra: "-T v142,host=x86"}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configure CBSDK
        run: |
          cmake --version
          cmake -B build -S . \
          -DCBSDK_BUILD_CBMEX=OFF \
          -DCBSDK_BUILD_CBOCT=OFF \
          -DCBSDK_BUILD_TEST=ON \
          -DCBSDK_BUILD_SAMPLE=OFF \
          -DCBSDK_BUILD_TOOLS=OFF \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_INSTALL_PREFIX=${PWD}/install \
          ${{ matrix.config.cmake_extra }}

      - name: Build
        run: cmake --build build --config Release -j

      - name: Run Integration Tests
        run: >
          ctest --test-dir build --build-config Release --output-on-failure
          -R "^integration\."
        timeout-minutes: 5

  pycbsdk-integration:
    name: pycbsdk ${{ matrix.config.name }}
    runs-on: ${{ matrix.config.os }}
    strategy:
      fail-fast: false
      matrix:
        config:
          - {name: "macOS-latest", os: "macOS-latest"}
          - {name: "ubuntu-latest", os: "ubuntu-latest"}
          - {name: "windows-x64", os: "windows-latest"}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # setuptools-scm needs tags

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Configure and build CBSDK
        run: |
          cmake -B build -S . \
          -DCBSDK_BUILD_CBMEX=OFF \
          -DCBSDK_BUILD_CBOCT=OFF \
          -DCBSDK_BUILD_TEST=OFF \
          -DCBSDK_BUILD_SAMPLE=OFF \
          -DCBSDK_BUILD_TOOLS=OFF \
          -DCBSDK_BUILD_SHARED=ON \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_INSTALL_PREFIX=${PWD}/install
          cmake --build build --config Release -j
          cmake --install build --config Release

      - name: Install pycbsdk
        working-directory: pycbsdk
        run: |
          pip install -e ".[dev,numpy]"

      - name: Run pycbsdk integration tests
        working-directory: pycbsdk
        run: pytest tests/ -m integration --timeout=60 -v
        timeout-minutes: 5
