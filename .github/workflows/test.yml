name: Tests

on:
  push:
    branches:
      - 'master'
      - 'releases/**'
  pull_request:
    branches:
      - master

defaults:
  run:
    shell: bash

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/ruff-action@v3
        with:
          args: check
          src: pycbsdk/src
      - uses: astral-sh/ruff-action@v3
        with:
          args: format --check
          src: pycbsdk/src

  test:
    name: ${{ matrix.config.name }}
    runs-on: ${{ matrix.config.os }}
    strategy:
      fail-fast: false
      matrix:
        config:
          - {name: "windows-x64", os: "windows-2022", cmake_extra: "-T v142,host=x86"}
          - {name: "macOS-latest", os: "macOS-latest"}
          - {name: "ubuntu-latest", os: "ubuntu-latest"}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # setuptools-scm needs tags

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      # Single build: tests + shared library
      - name: Configure
        run: |
          cmake -B build -S . \
          -DCBSDK_BUILD_CBMEX=OFF \
          -DCBSDK_BUILD_CBOCT=OFF \
          -DCBSDK_BUILD_TEST=ON \
          -DCBSDK_BUILD_SAMPLE=OFF \
          -DCBSDK_BUILD_SHARED=ON \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_INSTALL_PREFIX=${{ github.workspace }}/install \
          ${{ matrix.config.cmake_extra }}

      - name: Build
        run: cmake --build build --config Release -j

      # C++ unit tests (fast, no device needed)
      - name: Unit Tests
        run: >
          ctest --test-dir build --build-config Release --output-on-failure
          -E "^(device|integration)\."

      # Diagnose nPlayServer startup (temporary)
      - name: Debug nPlayServer
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $nplay = (Get-ChildItem -Recurse build/tests/integration/_nplay_cache -Filter nPlayServer.exe).FullName | Select-Object -First 1
          Write-Host "Binary: $nplay"

          # Use procdump to capture a crash dump (-e = write dump on exception, -ma = full dump)
          $procdump = "C:\Procdump\procdump.exe"
          if (!(Test-Path $procdump)) {
            $procdump = (Get-Command procdump -ErrorAction SilentlyContinue).Source
          }
          if (!$procdump) {
            # Download procdump if not pre-installed
            Invoke-WebRequest -Uri "https://download.sysinternals.com/files/Procdump.zip" -OutFile procdump.zip
            Expand-Archive procdump.zip -DestinationPath procdump_dir
            $procdump = "procdump_dir\procdump.exe"
          }
          Write-Host "Procdump: $procdump"

          # Accept EULA
          & $procdump -accepteula 2>&1 | Out-Null

          # Launch nPlayServer under procdump: -e 1 = dump on first-chance exception, -ma = full dump
          $dumpDir = "crashdumps"
          New-Item -ItemType Directory -Force -Path $dumpDir | Out-Null
          $proc = Start-Process -FilePath $procdump -ArgumentList "-e", "1", "-ma", "-x", $dumpDir, $nplay, "-V", "--plugins", "noplugins", "--lockfile", "test_lock", "-n" -NoNewWindow -PassThru -Wait -RedirectStandardOutput procdump_stdout.txt -RedirectStandardError procdump_stderr.txt
          Write-Host "=== procdump stdout ==="
          Get-Content procdump_stdout.txt
          Write-Host "=== procdump stderr ==="
          Get-Content procdump_stderr.txt

          # List any dumps generated
          Write-Host "=== crash dumps ==="
          Get-ChildItem $dumpDir -Recurse

          # Use cdb (WinDbg command-line) to print the stack trace from the dump
          $dump = (Get-ChildItem $dumpDir -Filter *.dmp -Recurse).FullName | Select-Object -First 1
          if ($dump) {
            Write-Host "=== Stack trace from $dump ==="
            # cdb is in the Windows SDK, typically on GHA runners
            $cdb = (Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\Debuggers\x64\cdb.exe" -ErrorAction SilentlyContinue).FullName
            if (!$cdb) {
              $cdb = (Get-Command cdb -ErrorAction SilentlyContinue).Source
            }
            if ($cdb) {
              & $cdb -z $dump -c "!analyze -v; kP; q" 2>&1
            } else {
              Write-Host "cdb not found - listing dump file for manual analysis"
              Write-Host "Dump size: $((Get-Item $dump).Length) bytes"
            }
          } else {
            Write-Host "No crash dump generated"
          }

      # C++ integration tests (nPlayServer downloaded at configure time)
      - name: Integration Tests
        run: >
          ctest --test-dir build --build-config Release --output-on-failure
          -R "^integration\."
        timeout-minutes: 10

      # pycbsdk tests (reuse the shared library from the same build)
      - name: Install shared library
        run: cmake --install build --config Release

      - name: Set library path
        run: |
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            echo "CBSDK_LIB_DIR=${{ github.workspace }}/install/bin" >> "$GITHUB_ENV"
          else
            echo "CBSDK_LIB_DIR=${{ github.workspace }}/install/lib" >> "$GITHUB_ENV"
          fi

      - name: Install pycbsdk
        working-directory: pycbsdk
        run: uv sync

      - name: pycbsdk Tests
        working-directory: pycbsdk
        run: uv run pytest tests/ -m integration --timeout=120 -v
        timeout-minutes: 10
